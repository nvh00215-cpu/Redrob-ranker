============================================================================
AI tools declaration
============================================================================
ai_tools_used:
  - "Qwen"

ai_usage_summary: |
  Used Qwen 3.7 Plus for architectural discussion, designing the heuristic scoring logic, generating regex patterns for the 'Shipper vs. Researcher' lexicon, and code review. Strictly adhered to the hackathon's privacy and compute constraints: zero candidate data was ever fed into the LLM. The final ranking pipeline is 100% deterministic, offline, CPU-only Python code engineered by the team.

============================================================================
Approach summary
============================================================================
methodology_summary: |
  Context-aware heuristic ranker. We avoided naive keyword matching by cross-referencing titles against career descriptions to catch "keyword stuffers". The system applies hard filters for consulting-only backgrounds and pure researchers (using a Shipper vs. Researcher regex lexicon). It calculates job-hopper math (avg tenure < 18mo) and applies a behavioral reality multiplier using Redrob signals (ghost filtering for inactive users). Finally, it awards bonus points for JD "nice-to-haves" (LoRA, HR-tech, distributed systems). Runs in ~15 seconds on CPU.

